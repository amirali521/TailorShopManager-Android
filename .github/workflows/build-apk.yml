name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      output_format:
        description: 'Output Format (apk, aab, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Download Clean Gradle Wrapper Jar
        run: |
          mkdir -p gradle/wrapper
          curl -sLo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Environment Variables
        run: |
          touch .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Decoded debug.keystore from base64"
          else
            echo "No debug.keystore.base64 found, a new debug keystore will be auto-generated by build if needed"
          fi

      - name: Build Debug APK
        if: "${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == null) && (github.event.inputs.output_format == 'apk' || github.event.inputs.output_format == 'both' || github.event.inputs.output_format == null) }}"
        run: ./gradlew assembleDebug

      - name: Build Debug AAB
        if: "${{ (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == null) && (github.event.inputs.output_format == 'aab' || github.event.inputs.output_format == 'both' || github.event.inputs.output_format == null) }}"
        run: ./gradlew bundleDebug

      - name: Build Release APK
        if: "${{ github.event.inputs.build_type == 'release' && (github.event.inputs.output_format == 'apk' || github.event.inputs.output_format == 'both') }}"
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build Release AAB
        if: "${{ github.event.inputs.build_type == 'release' && (github.event.inputs.output_format == 'aab' || github.event.inputs.output_format == 'both') }}"
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: ignore

      - name: Upload AABs
        uses: actions/upload-artifact@v4
        with:
          name: android-aabs
          path: app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore
